// -------------------------------------------------------------------
// Helpers
// -------------------------------------------------------------------
function todayStr() {
  const d = new Date();
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}

function localDateString(d) {
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}

function getStreak(sessions, proteinLog) {
  const dates = {};
  sessions.forEach(s => { dates[s.date] = true; });
  Object.entries(proteinLog).forEach(([d, v]) => { if (v) dates[d] = true; });
  let streak = 0;
  const d = new Date();
  while (true) {
    const str = localDateString(d);
    if (dates[str]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function parseTargetReps(repsStr) {
  if (!repsStr) return 0;
  const m = String(repsStr).match(/(\d+)(?:\s*-\s*(\d+))?/);
  if (!m) return 0;
  const lo = parseInt(m[1], 10);
  const hi = m[2] ? parseInt(m[2], 10) : lo;
  return Math.round((lo + hi) / 2);
}

// Normalize an exercise to its setLogs array. Old sessions stored a single
// { weightUsed, completed } per exercise — project that across N sets so
// charts and history still light up for legacy data.
function readSetLogs(ex) {
  if (Array.isArray(ex.setLogs)) return ex.setLogs;
  const n = parseInt(ex.sets, 10) || 1;
  const targetReps = parseTargetReps(ex.reps);
  return Array.from({ length: n }, () => ({
    reps: ex.completed ? String(targetReps) : "",
    weight: ex.weightUsed ? String(ex.weightUsed) : "",
    status: ex.completed ? "done" : "pending",
    completedAt: null,
  }));
}

function epley1RM(weight, reps) {
  const w = parseFloat(weight), r = parseInt(reps, 10);
  if (!w || !r) return 0;
  if (r === 1) return w;
  return w * (1 + r / 30);
}

function completedSets(setLogs) {
  return (setLogs || []).filter(s => s && s.status === "done");
}

function numericCompletedSets(setLogs) {
  return completedSets(setLogs).filter(s => parseFloat(s.weight) > 0 && parseInt(s.reps, 10) > 0);
}

function compute1RM(setLogs) {
  const cs = numericCompletedSets(setLogs);
  if (!cs.length) return 0;
  return Math.max(...cs.map(s => epley1RM(s.weight, s.reps)));
}

function computeVolume(setLogs) {
  return numericCompletedSets(setLogs).reduce((sum, s) => sum + parseFloat(s.weight) * parseInt(s.reps, 10), 0);
}

function computeAvgWeightPerRep(setLogs) {
  const cs = numericCompletedSets(setLogs);
  const totalReps = cs.reduce((a, s) => a + parseInt(s.reps, 10), 0);
  const totalLoad = cs.reduce((a, s) => a + parseFloat(s.weight) * parseInt(s.reps, 10), 0);
  return totalReps ? totalLoad / totalReps : 0;
}

function buildProgressionData(sessions, lift, metric = "1rm") {
  const pts = [];
  sessions.forEach(s => {
    const ex = s.exercises.find(e => e.name === lift);
    if (!ex) return;
    const logs = readSetLogs(ex);
    if (!numericCompletedSets(logs).length) return;
    let value = 0;
    if (metric === "volume") value = computeVolume(logs);
    else if (metric === "avg") value = computeAvgWeightPerRep(logs);
    else value = compute1RM(logs);
    if (value > 0) pts.push({ date: s.date, weight: Math.round(value * 10) / 10 });
  });
  return pts.sort((a, b) => a.date.localeCompare(b.date));
}

async function fetchAll(userId) {
  const [{ data: ses, error: sesErr }, { data: pro, error: proErr }] = await Promise.all([
    sb.from("workout_sessions").select("date, day, label, intensity, exercises").eq("user_id", userId).order("date", { ascending: true }),
    sb.from("protein_log").select("date, hit").eq("user_id", userId),
  ]);
  if (sesErr) console.error("sessions fetch", sesErr);
  if (proErr) console.error("protein fetch", proErr);
  const proteinLog = {};
  (pro || []).forEach(r => { if (r.hit) proteinLog[r.date] = true; });
  return { sessions: ses || [], proteinLog };
}

async function upsertSession(userId, session) {
  const row = {
    user_id: userId,
    date: session.date,
    day: session.day,
    label: session.label,
    intensity: session.intensity,
    exercises: session.exercises,
  };
  const { error } = await sb.from("workout_sessions").upsert(row, { onConflict: "user_id,date,day" });
  if (error) console.error("upsert session", error);
}

async function setProtein(userId, date, hit) {
  if (hit) {
    const { error } = await sb.from("protein_log").upsert({ user_id: userId, date, hit: true }, { onConflict: "user_id,date" });
    if (error) console.error("upsert protein", error);
  } else {
    const { error } = await sb.from("protein_log").delete().match({ user_id: userId, date });
    if (error) console.error("delete protein", error);
  }
}

function useAuth() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  return { session, loading };
}

// -------------------------------------------------------------------
// SVG line chart
// -------------------------------------------------------------------
function SVGLineChart({ data, color }) {
  const W = 600, H = 220;
  const pad = { top:16, right:20, bottom:36, left:44 };
  const innerW = W - pad.left - pad.right;
  const innerH = H - pad.top - pad.bottom;
  const [hov, setHov] = useState(null);

  if (!data || data.length < 2) {
    return <div style={{ color:C.fgFaint, fontSize:12, padding:20, textAlign:"center" }}>Log at least 2 sessions to see progression.</div>;
  }

  const weights = data.map(d => d.weight);
  const minW = Math.min(...weights), maxW = Math.max(...weights);
  const wRange = maxW - minW || 10;
  const padW = wRange * 0.1;
  const yMin = minW - padW, yMax = maxW + padW;

  const xPos = i => pad.left + (i/(data.length-1))*innerW;
  const yPos = w => pad.top + (1-(w-yMin)/(yMax-yMin))*innerH;

  const pathD = data.map((d,i)=>(i===0?"M":"L")+xPos(i).toFixed(1)+","+yPos(d.weight).toFixed(1)).join(" ");

  const yTicks = [];
  const nT = 4;
  for (let i=0; i<=nT; i++) {
    const v = yMin + ((yMax-yMin)/nT)*i;
    yTicks.push({ v, y:yPos(v) });
  }
  const xLabels = [0, Math.floor((data.length-1)/2), data.length-1].filter((v,i,a)=>a.indexOf(v)===i);

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible" }} onMouseLeave={()=>setHov(null)}>
      {yTicks.map((t,i)=>(
        <line key={i} x1={pad.left} y1={t.y} x2={pad.left+innerW} y2={t.y} stroke="rgba(255,255,255,0.06)" strokeWidth={1} />
      ))}
      {yTicks.map((t,i)=>(
        <text key={i} x={pad.left-6} y={t.y+4} textAnchor="end" fill={C.fgFaint} fontSize={10}>{Math.round(t.v)}</text>
      ))}
      {xLabels.map(i=>(
        <text key={i} x={xPos(i)} y={H-8} textAnchor="middle" fill={C.fgFaint} fontSize={10}>{data[i].date.slice(5)}</text>
      ))}
      <path d={pathD} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" />
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={xPos(i)} cy={yPos(d.weight)} r={hov===i?5:3} fill={color} />
          <rect x={xPos(i)-12} y={pad.top} width={24} height={innerH} fill="transparent" onMouseEnter={()=>setHov(i)} />
        </g>
      ))}
      {hov !== null && (
        <g>
          <rect x={xPos(hov)-44} y={yPos(data[hov].weight)-34} width={88} height={24} rx={4} fill={C.bgPanel} stroke={C.border} />
          <text x={xPos(hov)} y={yPos(data[hov].weight)-18} textAnchor="middle" fill={C.fg} fontSize={11}>
            {data[hov].date.slice(5)} · {data[hov].weight} lbs
          </text>
        </g>
      )}
    </svg>
  );
}

function Pill({ color, bg, children }) {

// -------------------------------------------------------------------
// Main app (post-login)
// -------------------------------------------------------------------
function Workout({ session }) {
  const userId = session.user.id;
  const [tab, setTab] = useState("today");
  const [sessions, setSessions] = useState([]);
  const [proteinLog, setProteinLog] = useState({});
  const [activeDay, setActiveDay] = useState(() => {
    const v = parseInt(localStorage.getItem("workout_active_day") || "0", 10);
    return isNaN(v) ? 0 : Math.max(0, Math.min(5, v));
  });
  const [setLogs, setSetLogs] = useState({});
  const [selLift, setSelLift] = useState(TRACKABLE_LIFTS[0]);
  const [progMetric, setProgMetric] = useState("1rm");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchAll(userId).then(({ sessions, proteinLog }) => {
      setSessions(sessions);
      setProteinLog(proteinLog);
      setLoading(false);
    });
  }, [userId]);

  const today = todayStr();
  const cp = PLAN[activeDay];
  const iColor = IC[cp.intensity];
  const iBg = IB[cp.intensity];

  const todaySess = useMemo(
    () => sessions.find(s => s.date === today && s.day === cp.day),
    [sessions, today, cp.day]
  );

  // Hydrate today's per-set logs from existing session, or seed empty per the plan.
  useEffect(() => {
    const next = {};
    cp.exercises.forEach((ex, i) => {
      const existing = todaySess && todaySess.exercises && todaySess.exercises[i];
      if (existing && existing.name === ex.name) {
        const logs = readSetLogs(existing);
        const target = parseInt(ex.sets, 10) || logs.length || 1;
        // Pad if plan now has more sets than the saved record.
        next[i] = logs.length >= target
          ? logs
          : [...logs, ...Array.from({ length: target - logs.length }, () => ({
              reps: "", weight: "", status: "pending", completedAt: null,
            }))];
      } else {
        const n = parseInt(ex.sets, 10) || 1;
        next[i] = Array.from({ length: n }, () => ({
          reps: "", weight: "", status: "pending", completedAt: null,
        }));
      }
    });
    setSetLogs(next);
  }, [cp.day, todaySess && todaySess.date]); // eslint-disable-line

  const isExerciseDone = (i) => {
    const arr = setLogs[i];
    return Array.isArray(arr) && arr.length > 0 && arr.every(s => s.status !== "pending");
  };
  const doneCount = cp.exercises.filter((_, i) => isExerciseDone(i)).length;
  const allDone = doneCount === cp.exercises.length && cp.exercises.length > 0;
  const streak = getStreak(sessions, proteinLog);
  const progData = buildProgressionData(sessions, selLift, progMetric);

  // Persist session whenever per-set logs change
  const persistTimer = useRef(null);
  useEffect(() => {
    if (loading) return;
    const dirty = Object.values(setLogs).some(arr =>
      Array.isArray(arr) && arr.some(s => s && (s.status !== "pending" || (s.reps != null && s.reps !== "") || (s.weight != null && s.weight !== "")))
    );
    if (!dirty && !todaySess) return;
    clearTimeout(persistTimer.current);
    persistTimer.current = setTimeout(() => {
      const next = {
        date: today, day: cp.day, label: cp.label, intensity: cp.intensity,
        exercises: cp.exercises.map((ex, i) => ({
          name: ex.name, sets: ex.sets, reps: ex.reps,
          setLogs: setLogs[i] || [],
        })),
      };
      upsertSession(userId, next);
      setSessions(prev => {
        const filtered = prev.filter(s => !(s.date === today && s.day === cp.day));
        return [...filtered, next].sort((a,b)=>a.date.localeCompare(b.date));
      });
    }, 500);
    return () => clearTimeout(persistTimer.current);
  }, [setLogs]); // eslint-disable-line

  function updateSet(exIdx, setIdx, updates) {
    setSetLogs(prev => {
      const arr = prev[exIdx] || [];
      return { ...prev, [exIdx]: arr.map((s, j) => j === setIdx ? { ...s, ...updates } : s) };
    });
  }
  function markSetDone(exIdx, setIdx) {
    setSetLogs(prev => {
      const arr = prev[exIdx] || [];
      const cur = arr[setIdx];
      if (!cur) return prev;
      const willBeDone = cur.status !== "done";
      return { ...prev, [exIdx]: arr.map((s, j) => j === setIdx ? {
        ...s,
        status: willBeDone ? "done" : "pending",
        completedAt: willBeDone ? new Date().toISOString() : null,
      } : s) };
    });
  }
  function markSetSkipped(exIdx, setIdx) {
    setSetLogs(prev => {
      const arr = prev[exIdx] || [];
      const cur = arr[setIdx];
      if (!cur) return prev;
      const willBeSkipped = cur.status !== "skipped";
      return { ...prev, [exIdx]: arr.map((s, j) => j === setIdx ? {
        ...s,
        status: willBeSkipped ? "skipped" : "pending",
        completedAt: null,
      } : s) };
    });
  }
  function togglePro(d) {
    const next = !proteinLog[d];
    setProteinLog(p => { const n = { ...p }; if (next) n[d] = true; else delete n[d]; return n; });
    setProtein(userId, d, next);
  }
  function switchDay(i) {
    setActiveDay(i);
    localStorage.setItem("workout_active_day", String(i));
  }
  async function signOut() { await sb.auth.signOut(); }

  if (loading) return <FullPageSpinner />;

  return (
    <div style={{ minHeight:"100vh", color:C.fg, fontFamily:"var(--font-sans)" }}>
      {/* Header */}

        <div aria-hidden style={{ position:"absolute", top:"50%", right:"-4vw", transform:"translateY(-48%)", fontSize:"min(40vw, 460px)", fontWeight:800, letterSpacing:"-0.08em", lineHeight:0.8, userSelect:"none", pointerEvents:"none", color:"rgba(255,255,255,0.025)", fontFamily:"var(--font-sans)" }}>AZ</div>
        <div style={{ position:"relative", zIndex:2, display:"flex", alignItems:"flex-end", justifyContent:"space-between", flexWrap:"wrap", gap:14, maxWidth:1100, margin:"0 auto" }}>
          <div>
            <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.2em", textTransform:"uppercase", color:C.greenLight, marginBottom:8, display:"inline-flex", alignItems:"center", gap:10 }}>
              <span style={{ width:6, height:6, borderRadius:"50%", background:C.greenLight }} />
              2026 Program
            </div>
            <div style={{ fontSize:"clamp(28px,5vw,44px)", fontWeight:700, letterSpacing:"-0.035em", lineHeight:1.05, color:C.fg }}>Workout</div>
            <div style={{ fontSize:13, color:C.fgMuted, marginTop:6 }}>Push + Pull + Legs · 6 days/week · Target 185 by Dec 2026</div>
          </div>
          <div style={{ display:"flex", gap:24, alignItems:"center" }}>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:32, fontWeight:700, color:C.greenLight, lineHeight:1, letterSpacing:"-0.02em" }}>{streak}</div>
              <div style={{ fontSize:10, color:C.fgSubtle, letterSpacing:"0.12em", marginTop:4, fontWeight:600 }}>STREAK</div>
            </div>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:32, fontWeight:700, color:C.fg, lineHeight:1, letterSpacing:"-0.02em" }}>{sessions.length}</div>
              <div style={{ fontSize:10, color:C.fgSubtle, letterSpacing:"0.12em", marginTop:4, fontWeight:600 }}>SESSIONS</div>
            </div>
            <button onClick={signOut} className="ghost-btn"
              style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:6, color:C.fgMuted, padding:"8px 14px", fontSize:12, fontWeight:500, cursor:"pointer", letterSpacing:"0.02em", transition:"all 150ms" }}>
              Sign out
            </button>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", padding:"0 24px", borderBottom:`1px solid ${C.borderSoft}`, overflowX:"auto" }}>
        <div style={{ display:"flex", maxWidth:1100, margin:"0 auto", width:"100%" }}>
          {["today","weights","protein","history","progression"].map(t => (
            <button key={t} onClick={()=>setTab(t)} className="nav-btn"
              style={{ padding:"14px 18px", background:"transparent", border:"none",
                borderBottom: tab===t ? `2px solid ${C.greenLight}` : "2px solid transparent",
                color: tab===t ? C.fg : C.fgSubtle,
                fontSize:12, fontWeight:600, letterSpacing:"0.10em", textTransform:"uppercase", cursor:"pointer",
                transition:"color 150ms" }}>{t}</button>
          ))}
        </div>
      </div>

      {/* Body */}
      <div style={{ padding:"22px 24px 100px", maxWidth:1100, margin:"0 auto" }}>

        {/* TODAY */}
        {tab==="today" && (
          <div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:22 }}>
              {PLAN.map((d,i)=>{
                const active = i===activeDay, c = IC[d.intensity];
                return (
                  <button key={i} onClick={()=>switchDay(i)} className="day-btn"
                    style={{ padding:"7px 14px", background: active ? IB[d.intensity] : "transparent",
                      border:`1px solid ${active ? c : C.border}`, borderRadius:5,
                      color: active ? c : C.fgSubtle, fontSize:12, fontWeight:600, letterSpacing:"0.04em",
                      cursor:"pointer", transition:"all 150ms" }}>
                    Day {d.day}

              })}
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10, flexWrap:"wrap" }}>
              <div style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.02em", color:C.fg }}>{cp.label}</div>
              <Pill color={iColor} bg={iBg}>{cp.intensity}</Pill>
              {allDone && <Pill color={C.greenLight} bg={C.greenSoft}>Logged</Pill>}
              <div style={{ marginLeft:"auto", fontSize:13, color: allDone ? C.greenLight : C.fgSubtle, fontWeight:500 }}>
                {doneCount}/{cp.exercises.length}
              </div>
            </div>

            <div style={{ height:2, background:"rgba(255,255,255,0.06)", borderRadius:2, marginBottom:18 }}>

            <div style={{ ...card, display:"flex", gap:14, alignItems:"center", marginBottom:8 }}>

                const logs = setLogs[i] || [];

                const exDone = isExerciseDone(i);

                return (

                      transition:"background 120ms" }}>
                    <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:10, flexWrap:"wrap" }}>
                      <div style={{ fontSize:14, fontWeight:600,
                        color: exDone && !exHasDone ? C.fgFaint : C.fg,
                        textDecoration: exDone ? "line-through" : "none" }}>{ex.name}</div>
                      <div style={{ fontSize:11, color:iColor, fontWeight:600, letterSpacing:"0.04em" }}>
                        {ex.sets} × {ex.reps}{isBW ? " · BW" : suggested ? ` · ~${suggested} lbs` : ""}
                      </div>
                      {oneRM > 0 && (
                        <div style={{ fontSize:11, color:C.fgFaint, marginLeft:"auto", fontWeight:500 }}>
                          1RM ≈ {Math.round(oneRM)} lbs
                        </div>
                      )}
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {logs.map((log, j) => {
                        const done = log.status === "done";
                        const skipped = log.status === "skipped";
                        return (
                          <div key={j} style={{ display:"grid", gridTemplateColumns:"42px 1fr 1fr 70px", gap:8, alignItems:"center" }}>
                            <div style={{ fontSize:10,
                              color: done ? iColor : skipped ? C.amber : C.fgFaint,
                              letterSpacing:"0.1em", fontWeight:700 }}>SET {j+1}</div>
                            <input type="number" inputMode="numeric"
                              placeholder={skipped ? "—" : "reps"}
                              value={log.reps == null ? "" : log.reps}
                              disabled={skipped}
                              onChange={e => updateSet(i, j, { reps: e.target.value })}
                              style={{ ...inp, width:"100%", opacity: skipped ? 0.35 : 1 }} />
                            {isBW
                              ? <div style={{ fontSize:11, color:C.fgFaint, textAlign:"center" }}>BW</div>
                              : <input type="number" inputMode="decimal"
                                  placeholder={skipped ? "—" : (suggested ? String(suggested) : "lbs")}
                                  value={log.weight == null ? "" : log.weight}
                                  disabled={skipped}
                                  onChange={e => updateSet(i, j, { weight: e.target.value })}
                                  style={{ ...inp, width:"100%", opacity: skipped ? 0.35 : 1 }} />}
                            <div style={{ display:"flex", gap:4, justifyContent:"flex-end" }}>
                              <button onClick={() => markSetDone(i, j)} title="Done" className="set-btn"
                                style={{ width:30, height:30, padding:0, borderRadius:5,
                                  background: done ? iBg : "transparent",
                                  border:`1px solid ${done ? iColor : C.border}`,
                                  color: done ? iColor : C.fgSubtle,
                                  cursor:"pointer", fontSize:14, fontWeight:700,
                                  display:"flex", alignItems:"center", justifyContent:"center",
                                  transition:"all 150ms" }}>✓</button>
                              <button onClick={() => markSetSkipped(i, j)} title="Skip" className="set-btn"
                                style={{ width:30, height:30, padding:0, borderRadius:5,
                                  background: skipped ? C.amberSoft : "transparent",
                                  border:`1px solid ${skipped ? C.amber : C.border}`,
                                  color: skipped ? C.amber : C.fgSubtle,
                                  cursor:"pointer", fontSize:18, fontWeight:700, lineHeight:1,
                                  display:"flex", alignItems:"center", justifyContent:"center",

            <div style={{ ...card, display:"flex", gap:14, alignItems:"center" }}>
              <div style={{ fontSize:10, color:C.fgSubtle, letterSpacing:"0.12em", textTransform:"uppercase", minWidth:55, flexShrink:0, fontWeight:600 }}>Finisher</div>

            <div style={{ ...card, marginTop:14, display:"flex", alignItems:"center", justifyContent:"space-between" }}>

                <div style={lbl}>Protein Goal Today</div>

              </div>

                style={{ width:32, height:32, border:`1px solid ${proteinLog[today]?C.greenLight:C.border}`,

                {proteinLog[today] && <div style={{ fontSize:16, color:C.greenLight }}>✓</div>}

                <div key={lift} style={{ display:"grid", gridTemplateColumns:"1.6fr repeat(6,1fr)", padding:"12px 16px", borderBottom: i<arr.length-1?`1px solid ${C.borderSoft}`:"none", alignItems:"center", minWidth:580 }}>

                  {sessions.slice().sort((a,b)=>b.date.localeCompare(a.date)).map((s,i)=>{
                    const iC = IC[s.intensity]||C.fgSubtle;
                    const iB2 = IB[s.intensity]||"transparent";
                    const phit = !!proteinLog[s.date];
                    const tracked = s.exercises
                      .map(e => { const logs = readSetLogs(e); return { ex: e, logs, cs: numericCompletedSets(logs) }; })
                      .filter(t => t.cs.length > 0);
                    const sessionVolume = tracked.reduce((acc, t) => acc + computeVolume(t.logs), 0);
                    return (
                      <div key={i} style={card}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom: tracked.length?10:0, flexWrap:"wrap" }}>
                          <div style={{ fontSize:12, color:C.fgSubtle, fontFamily:"var(--font-mono)" }}>{s.date}</div>
                          <div style={{ fontSize:16, color:C.fg, fontWeight:600, letterSpacing:"-0.01em" }}>{s.label}</div>
                          <Pill color={iC} bg={iB2}>{s.intensity}</Pill>
                          {phit && <Pill color={C.greenLight} bg={C.greenSoft}>Protein ✓</Pill>}
                          {sessionVolume > 0 && (
                            <div style={{ marginLeft:"auto", fontSize:11, color:C.fgFaint, fontWeight:500 }}>
                              Volume {Math.round(sessionVolume).toLocaleString()} lbs
                            </div>
                          )}
                        </div>
                        {tracked.length>0 && (
                          <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                            {tracked.map((t, j) => {
                              const oneRM = compute1RM(t.logs);
                              const vol = computeVolume(t.logs);
                              return (
                                <div key={j} style={{ fontSize:12, color:C.fgMuted, background:"rgba(255,255,255,0.04)", padding:"4px 9px", borderRadius:4 }}>
                                  {t.ex.name}: <span style={{ color:iC, fontWeight:600 }}>{Math.round(oneRM)} 1RM</span>
                                  <span style={{ color:C.fgFaint }}> · {t.cs.length} sets · {Math.round(vol).toLocaleString()} vol</span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
          </div>
        )}

        {/* PROGRESSION */}
        {tab==="progression" && (
          <div>
            <div style={secTtl}>Lift Progression</div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:12 }}>
              {TRACKABLE_LIFTS.map(l=>(
                <button key={l} onClick={()=>setSelLift(l)} className="lift-btn"
                  style={{ padding:"6px 12px", background: selLift===l?"rgba(255,255,255,0.05)":"transparent",
                    border:`1px solid ${selLift===l?C.border:C.borderSoft}`, borderRadius:5,
                    color: selLift===l?C.fg:C.fgSubtle, fontSize:12, fontWeight:500, cursor:"pointer", transition:"all 150ms" }}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18 }}>
              {[
                { id:"1rm", label:"Est. 1RM" },
                { id:"volume", label:"Volume" },
                { id:"avg", label:"Avg Wt/Rep" },
              ].map(m => {
                const active = progMetric === m.id;
                return (
                  <button key={m.id} onClick={() => setProgMetric(m.id)} className="lift-btn"
                    style={{ padding:"5px 11px",
                      background: active ? C.greenSoft : "transparent",
                      border:`1px solid ${active ? C.greenLight : C.borderSoft}`,
                      borderRadius:5,
                      color: active ? C.greenLight : C.fgSubtle,
                      fontSize:10, fontWeight:700, letterSpacing:"0.10em", textTransform:"uppercase",
                      cursor:"pointer", transition:"all 150ms" }}>
                    {m.label}
                  </button>
                );
              })}
            </div>
            <div style={{ ...card, padding:"18px 12px 12px" }}>
              <div style={{ fontSize:12, color:C.fgSubtle, marginBottom:14, paddingLeft:14, fontWeight:500 }}>
                {selLift} · {progMetric === "1rm" ? "estimated 1RM (lbs)" : progMetric === "volume" ? "total volume (lbs)" : "average weight per rep (lbs)"} over time
              </div>
              <SVGLineChart data={progData} color={C.greenLight} />
            </div>

            <div style={secTtl}>Personal Bests · Est. 1RM</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))", gap:10 }}>
              {TRACKABLE_LIFTS.map(lift=>{
                const data = buildProgressionData(sessions, lift, "1rm");
                const best = data.length ? Math.max(...data.map(d=>d.weight)) : null;
                const latest = data.length ? data[data.length-1].weight : null;
                return (
                  <div key={lift} style={card}>
                    <div style={lbl}>{lift.replace("Barbell ","").replace(" Press","").replace("Dumbbell ","DB ").replace(" Deadlift"," DL")}</div>
                    <div style={{ fontSize:26, fontWeight:700, color: best?C.greenLight:C.fgFaint, letterSpacing:"-0.02em" }}>
                      {best ? Math.round(best) + " lbs" : "—"}
                    </div>
                    {latest != null && best != null && Math.round(latest) !== Math.round(best) && (
                      <div style={{ fontSize:12, color:C.fgSubtle, marginTop:3 }}>Latest: {Math.round(latest)} lbs</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// -------------------------------------------------------------------
// Root
// -------------------------------------------------------------------
function App() {
  const { session, loading } = useAuth();
  if (loading) return <FullPageSpinner />;
  if (!session) return <Login />;
  return <Workout session={session} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
